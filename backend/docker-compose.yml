name: ads_project_backend
services:
  # 1. Service untuk Backend
  ads_backend:
    build: .
    container_name: ads_backend
    ports:
      - "8000:8000"
    env_file:
      - .env
    depends_on:
      - db
    volumes:
      - ./storage:/app/storage
    restart: unless-stopped

  # 2. Service untuk Database PostgreSQL
  db:
    image: postgres:17-alpine
    container_name: postgres_db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "6969:5432"
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  pg_data:
    name: ads_pg_data
